<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Documento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        h1 {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vista Previa del Documento</h1>
        <!-- Aquí insertamos la imagen con el nombre exacto que pediste -->
        <img src="Captura de pantalla 2026-05-12 145453.jpg" alt="Constancia de la CURP de Axel Hernandez">
        <p>Archivo: Captura de pantalla 2026-05-12 145453.jpg</p>
    </div>

</body>
</html>
